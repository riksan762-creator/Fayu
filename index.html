<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SawargiPay - Digital Marketplace Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-overlay"></div>

    <header>
        <div class="container nav-container">
            <div class="logo">Sawargi<span>Pay</span></div>
            <div class="balance-box">
                <i class="fa-solid fa-wallet"></i>
                <span id="balance-text">Rp 0</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1>Layanan Sosial Media <span>Terbaik</span></h1>
            <p>Tingkatkan engagement akun Anda dengan layanan profesional, instan, dan bergaransi.</p>
        </section>

        <div class="search-wrapper">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Cari layanan (Contoh: Instagram, TikTok)..." onkeyup="search()">
            </div>
        </div>

        <div id="product-grid" class="product-grid">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
