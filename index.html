<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SawargiPay - CTO Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <header class="glass-card">
            <div class="brand">SAWARGIPAY</div>
            <div class="balance-info">
                <small>Saldo Server</small>
                <h2 id="balance-text">Rp 0</h2>
            </div>
            <button class="btn-primary" onclick="location.reload()">Refresh Data</button>
        </header>

        <main>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Cari layanan SMM..." onkeyup="search()">
            </div>
            <div id="product-grid" class="grid">
                <!-- Produk Otomatis -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
